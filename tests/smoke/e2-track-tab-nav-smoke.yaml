# E2: Track Tab Navigation
# Verifies: Tab switch fires analytics + correct content loads
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
# Switch to Deltron — fires tap(tab_deltron) + pageDisplayed(DeltronScreen)
- tapOn:
    text: "3030"
- extendedWaitUntil:
    visible:
      id: "deltron_topic_list"
    timeout: 15000
- assertVisible:
    id: "deltron_topic_list"
# Switch back — fires tap(tab_doom) + pageDisplayed(DoomTabScreen)
- tapOn:
    text: "DOOM"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 10000
- assertVisible:
    id: "doom_topic_list"
