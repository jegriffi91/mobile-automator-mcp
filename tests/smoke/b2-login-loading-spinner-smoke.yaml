# B2: Login Button Interaction
# Verifies: Login button is tappable, responds to interaction, and form re-submits.
# Stays on login screen entirely (no network needed).
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- assertVisible:
    id: "login_submit_button"
- assertVisible:
    text: "ENTER THE LAIR"
# Tap submit without input — stays on login screen
- tapOn:
    id: "login_submit_button"
# Button should still be there and interactive
- assertVisible:
    id: "login_submit_button"
# Enter text and verify it appears
- tapOn:
    id: "login_username_field"
- inputText: "Viktor Vaughn"
- assertVisible:
    text: "Viktor Vaughn"
# Submit again — will fail login (no server) but button interacts correctly
- tapOn:
    id: "login_submit_button"
- assertVisible:
    id: "login_submit_button"
