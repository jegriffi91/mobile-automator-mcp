# D5: Detail Share Sheet
# Verifies: Share button opens share sheet, can be dismissed
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- tapOn:
    id: "doom_topic_row_the_metal_face"
- extendedWaitUntil:
    visible:
      id: "detail_title"
    timeout: 15000
# Tap the share button
- tapOn:
    id: "detail_share_button"
# Share sheet should appear
- extendedWaitUntil:
    visible:
      id: "detail_share_sheet"
    timeout: 5000
- assertVisible:
    id: "detail_share_sheet"
