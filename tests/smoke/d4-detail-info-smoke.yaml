# D4: Detail Info Dialog
# Verifies: Info button in detail view shows topic metadata dialog
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- tapOn:
    id: "doom_topic_row_the_metal_face"
- extendedWaitUntil:
    visible:
      id: "detail_title"
    timeout: 15000
# Tap the info button
- tapOn:
    id: "detail_info_button"
# Confirmation dialog should appear with topic info
- assertVisible:
    text: "Topic Info"
# Dismiss the dialog
- tapOn:
    text: "OK"
# Should still be on detail view
- assertVisible:
    id: "detail_title"
