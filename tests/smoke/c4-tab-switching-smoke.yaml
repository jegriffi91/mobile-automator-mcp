# C4: Tab Switching
# Verifies: Tapping between DOOM and Deltron tabs shows correct content
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
# Start on DOOM tab
- assertVisible:
    id: "doom_topic_list"
# Switch to Deltron tab
- tapOn:
    text: "3030"
- extendedWaitUntil:
    visible:
      id: "deltron_topic_list"
    timeout: 15000
- assertVisible:
    id: "deltron_topic_list"
# Switch back to DOOM tab
- tapOn:
    text: "DOOM"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 10000
- assertVisible:
    id: "doom_topic_list"
