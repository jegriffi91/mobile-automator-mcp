# F2: Slow Lore Fetch (4s Stubbed Delay)
# Verifies: Loading indicator → list transition works with 4s server-side delay.
# WireMock stub adds 4000ms fixedDelayMilliseconds to doom lore response.
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
# Wait for login to complete (also bypassed via stub)
- extendedWaitUntil:
    visible:
      id: "doom_loading_indicator"
    timeout: 10000
# Loading indicator should be visible while lore fetches slowly
- assertVisible:
    id: "doom_loading_indicator"
# Wait for the slow 4s response to complete
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- assertVisible:
    id: "doom_topic_list"
- assertVisible:
    id: "doom_topic_row_the_metal_face"
