# Smoke test: Verify app launches and login screen elements are visible.
# Run via: npx tsx tests/smoke/run-smoke.ts
# Or via MCP: run_test(yamlPath: "tests/smoke/hierarchy-smoke.yaml", env: { APP_ID: "com.doombot.ios" })
appId: ${APP_ID}
---
- clearState
- launchApp
- assertVisible:
    id: "login_submit_button"
- assertVisible:
    id: "login_username_field"
