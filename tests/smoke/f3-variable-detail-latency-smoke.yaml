# F3: Variable Detail Latency
# Verifies: Multiple navigations succeed despite variable response times.
# Uses app-side DelaySimulator jitter (modulo-based: 0.3s–2.1s per call).
# Both detail navigations must complete regardless of varying latency.
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
# First detail navigation (may have different jitter delay)
- tapOn:
    id: "doom_topic_row_the_metal_face"
- extendedWaitUntil:
    visible:
      id: "detail_title"
    timeout: 15000
- assertVisible:
    id: "detail_title"
# Navigate back
- back
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 10000
# Second detail navigation (different jitter step)
- tapOn:
    id: "doom_topic_row_madvillainy"
- extendedWaitUntil:
    visible:
      id: "detail_title"
    timeout: 15000
- assertVisible:
    id: "detail_title"
- assertVisible:
    id: "detail_content"
