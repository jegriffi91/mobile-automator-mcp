# A7: Doom Lore Server Error (Stubbed API — 500)
# Verifies: WireMock returns 500 → error view with retry button appears
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_error_view"
    timeout: 15000
- assertVisible:
    id: "doom_error_view"
- assertVisible:
    id: "doom_retry_button"
