# B4: Detail Navigation (Stubbed API)
# Verifies: Navigating to a detail view loads content.
# Requires WireMock stubs for login + doom lore + detail.
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- tapOn:
    id: "doom_topic_row_the_metal_face"
- extendedWaitUntil:
    visible:
      id: "detail_title"
    timeout: 15000
- assertVisible:
    id: "detail_title"
- assertVisible:
    id: "detail_content"
