# B3: DOOM Tab Data Load (Stubbed API)
# Verifies: After stubbed login, DOOM tab loads and shows topic list.
# Requires WireMock stubs for login + doom lore.
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- assertVisible:
    id: "doom_topic_list"
