# C3: Pull to Refresh — DOOM Tab
# Verifies: Pull-to-refresh gesture reloads data
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 15000
- assertVisible:
    id: "doom_topic_list"
# Pull to refresh
- scroll:
    from:
      id: "doom_topic_list"
    direction: "DOWN"
# List should still be visible after refresh
- extendedWaitUntil:
    visible:
      id: "doom_topic_list"
    timeout: 10000
- assertVisible:
    id: "doom_topic_list"
