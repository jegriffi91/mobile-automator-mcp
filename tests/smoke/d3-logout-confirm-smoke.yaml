# D3: Logout Confirmation — Confirm
# Verifies: Logout alert → Confirm → returns to login screen
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "admin"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "tab_doom"
    timeout: 15000
- tapOn:
    id: "settings_button"
- extendedWaitUntil:
    visible:
      id: "settings_logout_button"
    timeout: 5000
- tapOn:
    id: "settings_logout_button"
# Alert should appear
- assertVisible:
    text: "Are you sure you want to leave the lair?"
# Tap Confirm
- tapOn:
    text: "Confirm"
# Should return to login screen
- extendedWaitUntil:
    visible:
      id: "login_title"
    timeout: 5000
- assertVisible:
    id: "login_title"
- assertVisible:
    id: "login_submit_button"
