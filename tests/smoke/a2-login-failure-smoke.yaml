# A2: Login Failure (Stubbed API)
# Verifies: WireMock stub → POST /api/login returns {success: false} → error toast appears
appId: io.appcision.project-doombot
---
- clearState
- launchApp
- tapOn:
    id: "login_username_field"
- inputText: "baduser"
- tapOn:
    id: "login_submit_button"
- extendedWaitUntil:
    visible:
      id: "login_error_toast"
    timeout: 10000
- assertVisible:
    id: "login_error_toast"
- assertVisible:
    id: "login_submit_button"
